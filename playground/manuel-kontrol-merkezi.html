<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manuel Kontrol Merkezi – Playground</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #050505; color: #e7e5e4; min-height: 100vh; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 2rem; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .panel { background: rgba(39,39,42,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 2rem; backdrop-filter: blur(12px); }
    .panel h2 { font-size: 1.1rem; margin: 0 0 1.5rem; color: #f59e0b; font-weight: 700; }

    /* KAYDIRMA ÇUBUKLARI - Aktif ve görünür */
    .slider-row { margin-bottom: 1.5rem; }
    .slider-row label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: #71717a; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .slider-row label span:first-child { display: flex; align-items: center; gap: 0.4rem; }
    .slider-row input[type="range"] {
      width: 100%; height: 10px; -webkit-appearance: none; appearance: none;
      background: linear-gradient(to right, #27272a 0%, #27272a 100%); border-radius: 5px; cursor: pointer;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; background: #f59e0b; border-radius: 50%;
      cursor: pointer; box-shadow: 0 0 12px rgba(245,158,11,0.5); border: 2px solid rgba(255,255,255,0.3);
    }
    .slider-row input[type="range"]::-webkit-slider-runnable-track { height: 10px; border-radius: 5px; }
    .slider-row input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; background: #f59e0b; border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 12px rgba(245,158,11,0.5); border: 2px solid rgba(255,255,255,0.3);
    }
    .slider-row input[type="range"]::-moz-range-track { height: 10px; background: #27272a; border-radius: 5px; }
    .slider-row .val { color: #f59e0b; font-weight: 700; }

    .btn { width: 100%; padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #a1a1aa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); }
    .btn.active { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.5); color: #f59e0b; }
    .btn.invert-active { background: white; color: black; border-color: white; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #27272a; flex-shrink: 0; }
    .btn.active .dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
    .scan-btn { font-size: 0.55rem; padding: 0.35rem 0.9rem; background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); border-radius: 9999px; cursor: pointer; font-weight: 700; }
    .scan-btn:hover { background: rgba(245,158,11,0.3); }

    .preview { background: #080808; border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; min-height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .preview img { max-width: 100%; max-height: 500px; object-fit: contain; transition: filter 0.2s ease-out; }
    .preview-placeholder { color: rgba(255,255,255,0.12); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.4em; }

    /* GÖRSEL YÜKLEME ALANI - Orijinal gibi */
    .upload-zone {
      width: 100%; padding: 1.25rem 1.5rem; background: rgba(39,39,42,0.4); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #71717a; margin-top: 1rem;
    }
    .upload-zone:hover { background: rgba(39,39,42,0.8); border-color: rgba(245,158,11,0.4); color: #f59e0b; }
    .upload-zone .icon { font-size: 1.1rem; opacity: 0.8; }
    .demo-btn { width: 100%; padding: 0.9rem; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); border-radius: 1rem; color: #10b981; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; margin-bottom: 0.5rem; transition: all 0.2s; }
    .demo-btn:hover { background: rgba(16,185,129,0.25); }

    .stone-mask { position: absolute; background: black; border-radius: 50%; filter: blur(12px); opacity: 0.85; pointer-events: none; z-index: 20; }
    .animate-scan { position: absolute; animation: scanLine 2.5s linear infinite; width: 100%; height: 2px; background: #f59e0b; box-shadow: 0 0 20px #f59e0b; z-index: 40; }
    @keyframes scanLine { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    .reset-btn { background: none; border: none; color: #71717a; cursor: pointer; font-size: 1.2rem; padding: 0.2rem; }
    .reset-btn:hover { color: #f59e0b; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2>Manuel Kontrol</h2>
        <button class="reset-btn" onclick="resetLab()" title="Sıfırla">↻</button>
      </div>

      <div class="slider-row">
        <label><span>◐ Kontrast Ayarı</span><span id="contrastVal" class="val">%150</span></label>
        <input type="range" id="contrast" min="50" max="300" value="150" oninput="applyLab()" />
      </div>
      <div class="slider-row">
        <label><span>☀ Işık (Gama)</span><span id="brightnessVal" class="val">%110</span></label>
        <input type="range" id="brightness" min="50" max="250" value="110" oninput="applyLab()" />
      </div>
      <div class="slider-row">
        <label><span>◇ Yumuşatma / Noise</span><span id="sharpnessVal" class="val">2px</span></label>
        <input type="range" id="sharpness" min="0" max="20" value="2" oninput="applyLab()" />
      </div>

      <hr />

      <div style="margin-bottom:0.5rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
          <span style="font-size:0.65rem;font-weight:700;color:#71717a;text-transform:uppercase;letter-spacing:0.1em">Segmentasyon</span>
          <button class="scan-btn" id="scanBtn" onclick="startScan()">ALANI TARA</button>
        </div>
        <button class="btn" id="maskBtn" onclick="toggleMask()">
          <span>Taş Bölgelerini Koru</span>
          <div class="dot"></div>
        </button>
        <button class="btn" id="invertBtn" onclick="toggleInvert()">
          <span>Negatif Görünüm (Invert)</span>
        </button>
      </div>

      <button class="demo-btn" onclick="loadDemoImage()">▶ Demo görseli yükle (deneme)</button>
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <span class="icon">📷</span>
        <span>Eskiz / Görsel Yükle</span>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleUpload(event)" />
      </div>
    </div>

    <div class="panel preview" id="previewArea">
      <div id="scanLine"></div>
      <img id="previewImg" src="" alt="" style="display:none" />
      <div id="stoneOverlay" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;display:none">
        <div class="stone-mask" style="top:42%;left:45%;width:80px;height:80px"></div>
        <div class="stone-mask" style="top:46%;left:48%;width:64px;height:64px"></div>
        <div style="position:absolute;top:38%;left:44%;font-size:7px;font-weight:700;text-transform:uppercase;background:#f59e0b;color:black;padding:2px 8px;border-radius:4px">Diamond Protected</div>
      </div>
      <div class="preview-placeholder" id="placeholder">Görsel yükle</div>
    </div>
  </div>

  <script>
    const lab = { contrast: 150, brightness: 110, sharpness: 2, maskStones: false, invert: false, isScanning: false, scanComplete: false };

    function updateSliderFill(id, min, max, value) {
      const el = document.getElementById(id);
      if (!el) return;
      const pct = ((value - min) / (max - min)) * 100;
      el.style.background = 'linear-gradient(to right, #f59e0b 0%, #f59e0b ' + pct + '%, #27272a ' + pct + '%, #27272a 100%)';
    }

    function applyLab() {
      lab.contrast = +document.getElementById('contrast').value;
      lab.brightness = +document.getElementById('brightness').value;
      lab.sharpness = +document.getElementById('sharpness').value;
      document.getElementById('contrastVal').textContent = '%' + lab.contrast;
      document.getElementById('brightnessVal').textContent = '%' + lab.brightness;
      document.getElementById('sharpnessVal').textContent = lab.sharpness + 'px';
      updateSliderFill('contrast', 50, 300, lab.contrast);
      updateSliderFill('brightness', 50, 250, lab.brightness);
      updateSliderFill('sharpness', 0, 20, lab.sharpness);
      updatePreview();
    }

    function updatePreview() {
      const img = document.getElementById('previewImg');
      if (!img.src) return;
      let f = 'contrast(' + lab.contrast + '%) brightness(' + lab.brightness + '%) grayscale(100%) blur(' + (lab.sharpness / 3) + 'px)';
      if (lab.invert) f += ' invert(100%)';
      img.style.filter = f;
    }

    function toggleMask() {
      lab.maskStones = !lab.maskStones;
      document.getElementById('maskBtn').classList.toggle('active', lab.maskStones);
      document.getElementById('stoneOverlay').style.display = (lab.maskStones && lab.scanComplete) ? 'block' : 'none';
    }

    function toggleInvert() {
      lab.invert = !lab.invert;
      document.getElementById('invertBtn').classList.toggle('invert-active', lab.invert);
      updatePreview();
    }

    function startScan() {
      lab.isScanning = true;
      lab.scanComplete = false;
      document.getElementById('scanBtn').style.display = 'none';
      document.getElementById('scanLine').className = 'animate-scan';
      document.getElementById('stoneOverlay').style.display = 'none';
      setTimeout(function() {
        lab.isScanning = false;
        lab.scanComplete = true;
        document.getElementById('scanLine').className = '';
        if (lab.maskStones) document.getElementById('stoneOverlay').style.display = 'block';
      }, 2000);
    }

    function resetLab() {
      lab.contrast = 150;
      lab.brightness = 110;
      lab.sharpness = 2;
      lab.maskStones = false;
      lab.invert = false;
      lab.scanComplete = false;
      document.getElementById('contrast').value = 150;
      document.getElementById('brightness').value = 110;
      document.getElementById('sharpness').value = 2;
      document.getElementById('maskBtn').classList.remove('active');
      document.getElementById('invertBtn').classList.remove('invert-active');
      document.getElementById('scanBtn').style.display = 'block';
      document.getElementById('stoneOverlay').style.display = 'none';
      applyLab();
    }

    applyLab();

    function loadDemoImage() {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#d4af37"/><stop offset="50%" style="stop-color:#f5e6c8"/><stop offset="100%" style="stop-color:#8b7355"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/></filter></defs><rect width="400" height="400" fill="#1a1a1a"/><circle cx="200" cy="180" r="80" fill="url(#g)" filter="url(#shadow)"/><circle cx="200" cy="180" r="50" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/><circle cx="165" cy="155" r="12" fill="#c0c0c0"/><circle cx="235" cy="155" r="12" fill="#c0c0c0"/><path d="M180 220 Q200 250 220 220" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/><ellipse cx="200" cy="320" rx="100" ry="25" fill="url(#g)" opacity="0.8"/></svg>';
      var img = document.getElementById('previewImg');
      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      updatePreview();
    }

    function handleUpload(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        const img = document.getElementById('previewImg');
        img.src = reader.result;
        img.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        updatePreview();
      };
      reader.readAsDataURL(file);
    }

    loadDemoImage();
  </script>

</body>
</html>
